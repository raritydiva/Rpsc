<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- DİL SEÇİMİ -->
  <div id="dil-secim">
    <h2 id="dil-baslik">Select Language</h2>
    <div id="dil-liste"></div>
  </div>

  <!-- MOD SEÇİMİ -->
  <div id="mod-secim" style="display:none">
    <h2 id="mod-baslik">Game Mode</h2>
    <div id="mod-liste" style="display:flex;flex-direction:column;gap:12px;align-items:center;width:100%;">
      <button class="dil-btn" onclick="modSec('ai')">🤖 VS AI</button>
      <button class="dil-btn" onclick="modSec('2p')">👥 2 Players</button>
    </div>
  </div>

  <!-- AYARLAR -->
  <div id="ayarlar-secim" style="display:none">
    <h2>⚙️ Settings</h2>

    <!-- Skin -->
    <p style="margin:10px 0 5px;font-size:1.1rem;">🎨 Theme</p>
    <div id="skin-liste" style="display:flex;flex-wrap:wrap;justify-content:center;gap:8px;"></div>

    <!-- Round Limit -->
    <p style="margin:14px 0 5px;font-size:1.1rem;">🏁 First to win</p>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
      <button class="dil-btn round-btn skin-aktif" data-round="3">3</button>
      <button class="dil-btn round-btn" data-round="5">5</button>
      <button class="dil-btn round-btn" data-round="7">7</button>
      <button class="dil-btn round-btn" data-round="10">10</button>
    </div>

    <!-- AI Zorluk (sadece AI modda görünür) -->
    <div id="zorluk-bolumu" style="display:none">
      <p style="margin:14px 0 5px;font-size:1.1rem;">🤖 AI Difficulty</p>
      <div style="display:flex;gap:8px;justify-content:center;">
        <button class="dil-btn zorluk-btn" data-zorluk="easy">😊 Easy</button>
        <button class="dil-btn zorluk-btn skin-aktif" data-zorluk="medium">😐 Medium</button>
        <button class="dil-btn zorluk-btn" data-zorluk="hard">😈 Hard</button>
      </div>
    </div>

    <!-- Özel Mod -->
    <p style="margin:14px 0 5px;font-size:1.1rem;">✨ Special Mode</p>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
      <button class="dil-btn ozelmod-btn skin-aktif" data-mod="normal">✅ Normal</button>
      <button class="dil-btn ozelmod-btn" data-mod="reverse">🔄 Reverse</button>
      <button class="dil-btn ozelmod-btn" data-mod="random">🎲 Random</button>
    </div>

    <button id="btn-isim-onayla" onclick="ayarlariOnayla()" style="margin-top:20px;background:linear-gradient(180deg,#26c89a,#007d5d);color:white;border:none;padding:14px 32px;font-size:1.3rem;border-radius:15px;cursor:pointer;">
      Next ▶
    </button>
  </div>

  <!-- İSİM SEÇİMİ -->
  <div id="isim-secim" style="display:none">
    <h2 id="isim-baslik">Enter your names</h2>
    <input type="text" id="isim1" placeholder="Player 1" maxlength="12">
    <input type="text" id="isim2" placeholder="Player 2" maxlength="12">
    <button id="btn-isim-onayla" onclick="isimleriOnayla()">Start 🎮</button>
  </div>

  <!-- OYUN -->
  <div id="oyun" style="display:none">
    <div id="mod-rozeti" style="font-size:1rem;margin-bottom:5px;color:#ffed00;min-height:1.2rem;"></div>
    <h1 id="baslik">Rock Paper Scissors!</h1>
    <div id="isim-etiketler" style="display:flex;justify-content:center;gap:30px;font-size:1rem;margin-bottom:5px;">
      <span id="isim-etiket1" style="opacity:0.8;"></span>
      <span id="isim-etiket2" style="opacity:0.8;"></span>
    </div>
    <h2 id="tur">👤 Player 1, choose!</h2>
    <div id="sure-bar"></div>
    <p id="sure-yazi">8</p>
    <div id="skor">
      <span id="skor1">0</span>
      <span id="orta-cizgi">|</span>
      <span id="skor2">0</span>
    </div>
    <div id="butonlar">
      <button onclick="sec('tas')"><span id="btn-tas">🪨 Rock</span></button>
      <button onclick="sec('kagit')"><span id="btn-kagit">📄 Paper</span></button>
      <button onclick="sec('makas')"><span id="btn-makas">✂️ Scissors</span></button>
    </div>
    <button id="btn-dil-degistir" onclick="dilDegistir()">🌐 Change Language</button>
  </div>

  <h2 id="sonuc"></h2>
  <div id="konfeti-katman"></div>

  <script src="./script.js"></script>
</body>
</html>
